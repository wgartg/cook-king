<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New recipe | わっしょい みんなの料理人</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="brand">
    <span class="mark">わっしょい</span>
    <span class="title">みんなの料理人</span>
    <span class="sub">community-cookbook</span>
  </a>
  <nav class="nav-actions">
    <span id="auth-area"></span>
    <button id="theme-toggle" class="icon-btn" title="テーマ切り替え">☾</button>
    <a href="index.html" class="btn">← Recipes</a>
  </nav>
</header>

<div class="page">
  <aside class="sidebar">
    <a href="index.html">📖 レシピ一覧</a>
    <a href="post.html" class="active">＋ 新規投稿</a>
  </aside>

  <main class="content">
    <div class="form-card">
      <div id="local-banner" class="banner" style="display:none;">
        ⚠ Firebase未設定のため <code>local-mode</code> で動作中。投稿はこの端末のみに保存されます。
      </div>

      <div id="login-required" class="empty-state" style="display:none;">
        <h3>投稿にはログインが必要です</h3>
        <p>なりすまし防止のため、投稿にはDiscordログインが必要です。</p>
        <button id="login-required-btn" class="btn btn-primary">Discordでログイン</button>
      </div>

      <div id="no-permission" class="empty-state" style="display:none;">
        <h3>編集権限がありません</h3>
        <p>このレシピを編集できるのは、投稿した本人か管理者だけです。</p>
        <a href="index.html" class="btn">一覧へ戻る</a>
      </div>

      <form id="recipe-form" style="display:none;">
        <h2 id="form-title">＋ New recipe</h2>

        <div class="field">
          <label>料理名</label>
          <input type="text" id="title" placeholder="例: 鶏むね肉の照り焼き" required>
        </div>

        <div class="field-row">
          <div class="field">
            <label>調理時間(分)</label>
            <input type="number" id="cookTimeMin" min="1" placeholder="20">
          </div>
          <div class="field">
            <label>何人分</label>
            <input type="number" id="servings" min="1" placeholder="2">
          </div>
        </div>

        <div class="field" id="author-field">
          <label>投稿者名 <span class="hint">(任意 / ローカルモードのみ)</span></label>
          <input type="text" id="authorName" placeholder="例: たろう">
        </div>
        <div class="field" id="author-display" style="display:none;">
          <label>投稿者</label>
          <div style="display:flex; align-items:center; gap:.5rem;">
            <img id="author-avatar" src="" alt="" style="width:24px;height:24px;border-radius:50%;">
            <span id="author-username" class="mono"></span>
          </div>
        </div>

        <div class="field">
          <label>写真 <span class="hint" id="image-hint">(任意)</span></label>
          <div id="existing-image-preview" style="display:none; margin-bottom:.6rem;">
            <img id="existing-image" src="" alt="" style="max-width:160px; border-radius:6px; border:1px solid var(--border);">
          </div>
          <input type="file" id="imageFile" accept="image/*">
        </div>

        <div class="field">
          <label>材料</label>
          <div id="ingredient-list" class="dynamic-list"></div>
          <button type="button" class="add-row" id="add-ingredient">＋ 材料を追加</button>
        </div>

        <div class="field">
          <label>作り方</label>
          <div id="step-list" class="dynamic-list"></div>
          <button type="button" class="add-row" id="add-step">＋ 手順を追加</button>
        </div>

        <div class="form-footer">
          <a href="index.html" class="btn">キャンセル</a>
          <button type="submit" class="btn btn-primary" id="submit-btn">Publish recipe</button>
        </div>

        <div id="status" class="status-msg"></div>
      </form>
    </div>
  </main>
</div>

<footer>わっしょい みんなの料理人 — community cookbook, 10 users edition</footer>

<script type="module">
  import { initTheme, toggleTheme } from "./js/theme.js";
  import { mountAuthArea } from "./js/auth-ui.js";
  initTheme();
  document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
  mountAuthArea();
</script>

<script type="module">
  import { createRecipe, updateRecipe, getRecipe, isLocalMode } from "./js/data.js";

  const params = new URLSearchParams(window.location.search);
  const editId = params.get("id");

  const form = document.getElementById("recipe-form");
  const loginRequired = document.getElementById("login-required");
  const noPermission = document.getElementById("no-permission");
  const authorField = document.getElementById("author-field");
  const authorDisplay = document.getElementById("author-display");
  let currentProfile = null;
  let existingRecipe = null;

  const ingredientList = document.getElementById("ingredient-list");
  const stepList = document.getElementById("step-list");

  function escapeHtml(str) {
    return (str || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function addIngredientRow(name = "", amount = "") {
    const row = document.createElement("div");
    row.className = "dynamic-row";
    row.innerHTML = `
      <input type="text" placeholder="材料名(例: 鶏むね肉)" class="ing-name" value="${escapeHtml(name)}">
      <input type="text" placeholder="分量(例: 200g)" class="ing-amount" style="max-width:130px" value="${escapeHtml(amount)}">
      <button type="button" class="rm">✕</button>`;
    row.querySelector(".rm").addEventListener("click", () => row.remove());
    ingredientList.appendChild(row);
  }

  function addStepRow(text = "") {
    const row = document.createElement("div");
    row.className = "dynamic-row step-item";
    const num = stepList.children.length + 1;
    const textarea = document.createElement("textarea");
    textarea.placeholder = "手順を入力";
    textarea.rows = 2;
    textarea.style.flex = "1";
    textarea.value = text; // 改行を保持するためvalueで設定(innerHTML経由にしない)

    const numDiv = document.createElement("div");
    numDiv.className = "step-num";
    numDiv.textContent = num;

    const rmBtn = document.createElement("button");
    rmBtn.type = "button";
    rmBtn.className = "rm";
    rmBtn.textContent = "✕";
    rmBtn.addEventListener("click", () => { row.remove(); renumberSteps(); });

    row.appendChild(numDiv);
    row.appendChild(textarea);
    row.appendChild(rmBtn);
    stepList.appendChild(row);
  }

  function renumberSteps() {
    [...stepList.children].forEach((row, i) => {
      row.querySelector(".step-num").textContent = i + 1;
    });
  }

  document.getElementById("add-ingredient").addEventListener("click", () => addIngredientRow());
  document.getElementById("add-step").addEventListener("click", () => addStepRow());

  function compressImage(file, maxWidth = 900, quality = 0.72) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = () => { img.src = reader.result; };
      reader.onerror = reject;
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  const statusEl = document.getElementById("status");
  const submitBtn = document.getElementById("submit-btn");

  async function notifyDiscord(recipeId) {
    try {
      const { SHARE_LINK_BASE } = await import("./js/auth-config.js");
      await fetch(`${SHARE_LINK_BASE.replace(/\/$/, "")}/notify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipeId }),
      });
    } catch {
      // 通知に失敗しても投稿自体はすでに成功しているので、ここでは何もしない
    }
  }

  function fillFormFromRecipe(r) {
    document.getElementById("title").value = r.title || "";
    document.getElementById("cookTimeMin").value = r.cookTimeMin || "";
    document.getElementById("servings").value = r.servings || "";
    ingredientList.innerHTML = "";
    stepList.innerHTML = "";
    (r.ingredients || []).forEach(i => addIngredientRow(i.name, i.amount));
    (r.steps || []).forEach(s => addStepRow(s));
    if (!(r.ingredients || []).length) addIngredientRow();
    if (!(r.steps || []).length) addStepRow();
    if (r.imageUrl) {
      document.getElementById("existing-image-preview").style.display = "block";
      document.getElementById("existing-image").src = r.imageUrl;
      document.getElementById("image-hint").textContent = "(変更する場合のみ新しい写真を選択)";
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.textContent = "";
    statusEl.className = "status-msg";

    const title = document.getElementById("title").value.trim();
    if (!title) { statusEl.textContent = "料理名を入力してください。"; statusEl.className = "status-msg error"; return; }

    const ingredients = [...ingredientList.querySelectorAll(".dynamic-row")]
      .map(row => ({
        name: row.querySelector(".ing-name").value.trim(),
        amount: row.querySelector(".ing-amount").value.trim()
      }))
      .filter(i => i.name);

    const steps = [...stepList.querySelectorAll("textarea")]
      .map(t => t.value.trim())
      .filter(Boolean);

    if (!ingredients.length) { statusEl.textContent = "材料を1つ以上入力してください。"; statusEl.className = "status-msg error"; return; }
    if (!steps.length) { statusEl.textContent = "作り方を1つ以上入力してください。"; statusEl.className = "status-msg error"; return; }

    submitBtn.disabled = true;
    statusEl.textContent = editId ? "更新中..." : "投稿中...";

    try {
      const fileInput = document.getElementById("imageFile");
      const file = fileInput.files[0] || null;

      const fields = {
        title,
        cookTimeMin: Number(document.getElementById("cookTimeMin").value) || null,
        servings: Number(document.getElementById("servings").value) || null,
        ingredients,
        steps
      };

      if (editId) {
        fields.imageUrl = file ? await compressImage(file) : (existingRecipe.imageUrl || "");
        fields.authorId = existingRecipe.authorId;
        fields.authorName = existingRecipe.authorName;
        fields.authorAvatar = existingRecipe.authorAvatar;
        await updateRecipe(editId, fields);
        statusEl.textContent = "更新しました!詳細ページへ移動します。";
        setTimeout(() => { window.location.href = "detail.html?id=" + editId; }, 800);
      } else {
        fields.imageUrl = file ? await compressImage(file) : "";
        if (currentProfile) {
          fields.authorId = currentProfile.uid;
          fields.authorName = currentProfile.username;
          fields.authorAvatar = currentProfile.avatarUrl;
        } else {
          fields.authorName = document.getElementById("authorName").value.trim() || "名無しさん";
        }
        const newId = await createRecipe(fields);
        if (!isLocalMode) notifyDiscord(newId); // 失敗しても投稿自体は成功させたいのでawaitしない
        statusEl.textContent = "投稿しました!一覧ページへ移動します。";
        setTimeout(() => { window.location.href = "detail.html?id=" + newId; }, 800);
      }
    } catch (err) {
      statusEl.textContent = "保存に失敗しました: " + err.message;
      statusEl.className = "status-msg error";
      submitBtn.disabled = false;
    }
  });

  async function init() {
    if (editId) {
      existingRecipe = await getRecipe(editId);
      if (!existingRecipe) {
        noPermission.querySelector("h3").textContent = "レシピが見つかりません";
        noPermission.querySelector("p").textContent = "";
        noPermission.style.display = "block";
        return;
      }

      let canEdit = isLocalMode;
      if (!isLocalMode) {
        const { getProfile } = await import("./js/auth.js");
        currentProfile = getProfile();
        canEdit = !!currentProfile && (currentProfile.isAdmin || currentProfile.uid === existingRecipe.authorId);
      }

      if (!canEdit) {
        noPermission.style.display = "block";
        return;
      }

      document.getElementById("form-title").textContent = "✏️ Edit recipe";
      document.getElementById("submit-btn").textContent = "更新する";
      authorField.style.display = "none";
      authorDisplay.style.display = "block";
      document.getElementById("author-avatar").src = existingRecipe.authorAvatar || "";
      document.getElementById("author-username").textContent = existingRecipe.authorName || "名無しさん";
      fillFormFromRecipe(existingRecipe);

      if (isLocalMode) document.getElementById("local-banner").style.display = "flex";
      form.style.display = "block";
      // 新規作成用の初期空行が入らないよう、最初のaddIngredientRow/addStepRow呼び出しはスキップ
      return;
    }

    // 新規投稿モード
    addIngredientRow(); addIngredientRow(); addIngredientRow();
    addStepRow(); addStepRow();

    if (isLocalMode) {
      document.getElementById("local-banner").style.display = "flex";
      form.style.display = "block";
      return;
    }

    const { getProfile, loginWithDiscord } = await import("./js/auth.js");
    currentProfile = getProfile();
    document.getElementById("login-required-btn").addEventListener("click", loginWithDiscord);
    if (currentProfile) {
      form.style.display = "block";
      authorField.style.display = "none";
      authorDisplay.style.display = "block";
      document.getElementById("author-avatar").src = currentProfile.avatarUrl;
      document.getElementById("author-username").textContent = currentProfile.username;
    } else {
      loginRequired.style.display = "block";
    }
  }

  init();
</script>
</body>
</html>
